modules:
  - name: node
    install:
      - pacman:nvm
      - pacman:bun
    exec: |
      source /usr/share/nvm/init-nvm.sh
      LATEST="$(nvm ls-remote --lts | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' | tail -1)"
      if ! nvm ls "$LATEST" &>/dev/null; then
        nvm install "$LATEST"
      fi
      nvm use "$LATEST"
      nvm alias default "$LATEST"
