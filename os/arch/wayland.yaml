modules:
  - name: hyprland
    default: false
    install:
      - pacman:wayland
      - pacman:wayland-protocols
      - pacman:libinput
      - pacman:polkit
      - pacman:uwsm
      - pacman:xdg-desktop-portal
      - pacman:xdg-desktop-portal-wlr
      - pacman:xorg-xwayland
      - pacman:hyprland
      - pacman:xdg-utils
      - pacman:wl-clipboard
      - pacman:qt6-wayland
      - pacman:qt5-wayland
      - pacman:hyprpaper
      - pacman:xdg-desktop-portal-gtk
      - pacman:xdg-desktop-portal-hyprland
    config: ~/.config/hypr

  - name: waybar
    default: false
    install:
      - pacman:waybar
      - pacman:otf-font-awesome
    config: ~/.config/waybar
